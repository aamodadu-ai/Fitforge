<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>FitForge Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg: #0b0c16; --card: #141629; --input: #0f101f; --border: #1e2139; --accent: #8b79ff; --text: #e2e4f0; --muted: #6b72a0; --syne: 'Syne', sans-serif; --mono: 'JetBrains Mono', monospace; }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { background:var(--bg); color:var(--text); font-family:var(--mono); padding: 20px; line-height: 1.5; }
    
    .header-label { color: var(--accent); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
    .header-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .field label span { color: var(--accent); }

    input, select, textarea { 
        background: var(--input); border: 1px solid var(--border); border-radius: 8px; 
        color: var(--text); padding: 14px; font-size: 14px; outline: none; font-family: var(--mono);
    }
    input:focus, select:focus { border-color: var(--accent); }

    .btn { 
        width: 100%; background: var(--accent); color: white; border: none; border-radius: 10px; 
        padding: 18px; font-weight: 800; font-family: var(--syne); font-size: 16px; 
        cursor: pointer; margin-top: 20px; text-transform: uppercase; transition: 0.3s;
    }
    .btn:active { transform: scale(0.98); background: #7a66ff; }

    /* Key Setup Modal */
    #key-modal { position:fixed; inset:0; background:var(--bg); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal-card { background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 400px; }

    /* Results */
    .hidden { display: none !important; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .plan-text { font-size: 14px; line-height: 1.8; }
    .plan-text b, .plan-text strong { color: var(--accent); }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { background: var(--input); border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  </style>
</head>
<body>

<div id="key-modal" class="hidden">
    <div class="modal-card">
        <h2 style="font-family:var(--syne); margin-bottom:10px;">Setup Key</h2>
        <p style="font-size:12px; color:var(--muted); margin-bottom:20px;">Paste your Gemini API key to start research.</p>
        <input type="password" id="userApiKey" placeholder="AIzaSy...">
        <button class="btn" onclick="saveKey()">Unlock App</button>
    </div>
</div>

<div id="main-ui">
    <div class="header-label">Your Profile</div>

    <div id="form-container">
        <div class="grid">
            <div class="field"><label>Age <span>*</span></label><input type="number" id="age" placeholder="e.g. 22"></div>
            <div class="field"><label>Gender</label><select id="gender"><option>Male</option><option>Female</option></select></div>
            <div class="field"><label>Fitness Level</label><select id="level"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></div>
        </div>

        <div class="grid">
            <div class="field"><label>Current Weight (kg) <span>*</span></label><input type="number" id="weight" placeholder="e.g. 72"></div>
            <div class="field"><label>Height (cm) <span>*</span></label><input type="number" id="height" placeholder="e.g. 175"></div>
        </div>

        <div class="grid">
            <div class="field"><label>Goal</label><select id="goal"><option>Muscle Gain</option><option>Fat Loss</option><option>Endurance</option></select></div>
            <div class="field"><label>Target Weight (kg) <span>*</span></label><input type="number" id="target" placeholder="e.g. 80"></div>
            <div class="field"><label>Timeframe</label><select id="time"><option>8 weeks</option><option selected>12 weeks</option><option>16 weeks</option></select></div>
        </div>

        <div class="grid">
            <div class="field"><label>Diet Preference</label><select id="diet"><option>Non-Vegetarian</option><option>Vegetarian</option><option>Vegan</option></select></div>
            <div class="field"><label>Days / Week</label><select id="days"><option>3 days</option><option>4 days</option><option selected>5 days</option><option>6 days</option></select></div>
            <div class="field"><label>Equipment</label><select id="equipment"><option>Full Gym</option><option>Dumbbells Only</option><option>Bodyweight</option></select></div>
        </div>

        <div class="field">
            <label>Any Injuries or conditions? (Optional)</label>
            <textarea id="injuries" rows="2" placeholder="e.g. lower back pain, bad knees..."></textarea>
        </div>

        <button class="btn" onclick="generate()">⚡ Research & Generate My Plan</button>
    </div>

    <div id="loading" class="hidden" style="text-align:center; padding:40px;">
        <p style="color:var(--accent); animation: pulse 1.5s infinite;">Processing Bio-metrics...</p>
    </div>

    <div id="results" class="hidden">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('workout', this)">Workout</button>
            <button class="tab-btn" onclick="switchTab('diet', this)">Diet Plan</button>
        </div>
        <div id="tab-workout" class="card plan-text"></div>
        <div id="tab-diet" class="card plan-text hidden"></div>
        <button class="btn" style="background:var(--input)" onclick="location.reload()">Start New Session</button>
    </div>
</div>

<script>
window.onload = () => { if (!localStorage.getItem('gemini_key')) document.getElementById('key-modal').classList.remove('hidden'); };
function saveKey() { const k = document.getElementById('userApiKey').value; if(k) { localStorage.setItem('gemini_key', k); location.reload(); } }

async function generate() {
    const key = localStorage.getItem('gemini_key');
    const data = {
        age: document.getElementById('age').value,
        weight: document.getElementById('weight').value,
        height: document.getElementById('height').value,
        goal: document.getElementById('goal').value,
        target: document.getElementById('target').value,
        days: document.getElementById('days').value,
        diet: document.getElementById('diet').value,
        equip: document.getElementById('equipment').value,
        injuries: document.getElementById('injuries').value
    };

    if(!data.weight || !data.height) return alert("Please fill required fields (*)");

    document.getElementById('form-container').classList.add('hidden');
    document.getElementById('loading').classList.remove('hidden');

    const prompt = `Act as an expert fitness researcher. Create a professional plan:
    Profile: ${data.age}yo, ${data.weight}kg, ${data.height}cm. Goal: ${data.goal} (Target: ${data.target}kg).
    Schedule: ${data.days} at ${data.equip}. Diet: ${data.diet}. Injuries: ${data.injuries}.
    Format with ## Workout and ## Diet. Use bolding.`;

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const result = await response.json();
        if(result.error) throw new Error(result.error.message);

        const text = result.candidates[0].content.parts[0].text;
        const sections = text.split('##');

        document.getElementById('tab-workout').innerHTML = (sections.find(s => s.toLowerCase().includes('workout')) || "Check Diet").replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        document.getElementById('tab-diet').innerHTML = (sections.find(s => s.toLowerCase().includes('diet')) || "Check Workout").replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
    } catch (e) {
        alert("Error: " + e.message);
        localStorage.removeItem('gemini_key');
        location.reload();
    }
}

function switchTab(tab, btn) {
    document.getElementById('tab-workout').classList.toggle('hidden', tab !== 'workout');
    document.getElementById('tab-diet').classList.toggle('hidden', tab !== 'diet');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
</script>
</body>
</html>
